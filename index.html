<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>M4RQX — Portefólio</title>
<meta name="description" content="Apps, plataformas e sites por M4RQX. Repositórios abertos no GitHub." />
<meta property="og:title" content="M4RQX — Portefólio" />
<meta property="og:description" content="Apps, plataformas e sites. Cinco projetos, cinco links." />
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="7" fill="%23a78bfa"/><text x="50%" y="68%" text-anchor="middle" fill="%23070d1f" font-family="ui-sans-serif,system-ui" font-size="18" font-weight="800">M</text></svg>' />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #070d1f;
    --panel: #1a2647;
    --panel-hi: #243358;
    --panel-featured: #1a2647;
    --line: rgba(220, 230, 255, 0.10);
    --line-mid: rgba(220, 230, 255, 0.20);
    --line-accent: rgba(167, 139, 250, 0.5);
    --text: #f4f7ff;
    --text-soft: #d4daee;
    --text-mute: #8d96b3;
    --text-dim: #525c7a;
    --accent: #a78bfa;
    --accent-strong: #c4b5fd;
    --accent-soft: rgba(167, 139, 250, 0.14);
    --warn: #fbbf24;
    --warn-soft: rgba(251, 191, 36, 0.12);
    --sans: 'Geist', system-ui, -apple-system, sans-serif;
    --display: 'Bricolage Grotesque', 'Geist', system-ui, sans-serif;
    --mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    --radius: 14px;
    --radius-lg: 22px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(36, 51, 88, 0.6), transparent 70%),
      var(--bg);
    background-attachment: fixed;
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  a { color: inherit; text-decoration: none; }
  a:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
    border-radius: 4px;
  }

  .container {
    max-width: 1320px;
    margin: 0 auto;
    padding: 0 clamp(1.25rem, 4vw, 3rem);
  }

  /* ===== MASTHEAD ===== */
  .bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.5rem 0;
  }
  .brand {
    font-weight: 600;
    font-size: 0.92rem;
    letter-spacing: -0.005em;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }
  .brand::before {
    content: '';
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 3px;
    display: inline-block;
  }
  .gh-link {
    display: inline-flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.35rem 0.75rem 0.35rem 0.4rem;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-soft);
    transition: border-color 200ms ease, background 200ms ease, transform 150ms ease;
  }
  .gh-link:hover { border-color: var(--line-accent); background: var(--panel-hi); }
  .gh-link:active { transform: translateY(1px); }
  .gh-link .avatar {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--panel-hi);
  }
  .gh-link .gh-sep { color: var(--text-dim); }
  .gh-link .gh-count { color: var(--text-mute); font-variant-numeric: tabular-nums; }
  .gh-link.loading .gh-count { opacity: 0.4; }

  /* ===== HERO ===== */
  .hero {
    padding: clamp(3rem, 8vw, 7rem) 0 clamp(2.5rem, 6vw, 4.5rem);
  }
  .hero h1 {
    font-family: var(--display);
    font-weight: 700;
    font-size: clamp(2.75rem, 8vw, 6rem);
    font-variation-settings: 'opsz' 96, 'wdth' 100;
    line-height: 0.95;
    letter-spacing: -0.045em;
    text-wrap: balance;
    max-width: 22ch;
  }
  .hero h1 .acc { color: var(--accent); }
  .hero h1 .arrow {
    display: inline-block;
    transform: translateY(-0.06em) rotate(-2deg);
    color: var(--accent);
  }

  /* ===== BENTO ===== */
  .bento {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.85rem;
    padding-bottom: clamp(3rem, 6vw, 5rem);
  }

  .tile {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 1.5rem;
    color: inherit;
    min-height: 230px;
    overflow: hidden;
    isolation: isolate;
    transition: background 220ms ease, border-color 220ms ease, transform 220ms ease;
  }
  .tile::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(80% 60% at 90% 0%, rgba(167, 139, 250, 0.07), transparent 60%);
    opacity: 0;
    transition: opacity 280ms ease;
    z-index: -1;
    pointer-events: none;
  }
  .tile:hover {
    background: var(--panel-hi);
    border-color: var(--line-mid);
    transform: translateY(-2px);
  }
  .tile:hover::after { opacity: 1; }
  .tile:active { transform: translateY(0); }

  .tile--feature {
    grid-column: 1 / -1;
    border-radius: var(--radius-lg);
    padding: clamp(1.75rem, 4vw, 2.75rem);
    min-height: clamp(320px, 38vw, 420px);
    background: var(--panel-featured);
  }
  .tile--feature::before {
    content: '';
    position: absolute;
    top: -20%;
    right: -10%;
    width: 65%;
    height: 85%;
    background: radial-gradient(circle, rgba(167, 139, 250, 0.18), transparent 60%);
    pointer-events: none;
    z-index: -1;
  }

  .tile__head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.25rem;
  }
  .tile__tag {
    font-family: var(--mono);
    font-size: 0.66rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  }
  .tile__tag::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent);
  }
  .tile__meta {
    font-family: var(--mono);
    font-size: 0.66rem;
    color: var(--text-mute);
    letter-spacing: 0.04em;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    min-height: 0.85rem;
  }
  .tile__meta .lang-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }
  .tile__meta .sep { color: var(--text-dim); }
  .tile__meta.loading { opacity: 0.4; }
  .tile__meta.empty { opacity: 0; }

  .tile__body { flex: 1; min-width: 0; }
  .tile__name {
    font-family: var(--display);
    font-weight: 600;
    font-size: 1.5rem;
    font-variation-settings: 'opsz' 24, 'wdth' 100;
    letter-spacing: -0.025em;
    line-height: 1.05;
    margin-bottom: 0.55rem;
    transition: color 200ms ease;
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
  }
  .tile:hover .tile__name { color: var(--accent); }
  .tile--feature .tile__name {
    font-size: clamp(2.5rem, 5.5vw, 4rem);
    font-variation-settings: 'opsz' 96, 'wdth' 100;
    font-weight: 700;
    margin-bottom: 1rem;
    letter-spacing: -0.04em;
  }
  .tile--feature:hover .tile__name { color: var(--text); }
  .tile__desc {
    font-size: 0.9rem;
    color: var(--text-mute);
    line-height: 1.55;
  }
  .tile--feature .tile__desc {
    font-size: 1.05rem;
    line-height: 1.55;
    max-width: 42rem;
    color: var(--text-soft);
  }

  .tile__foot {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 1rem;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--line);
  }
  .tile__stack {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-mute);
    letter-spacing: 0.04em;
    line-height: 1.5;
    min-width: 0;
  }
  .tile__stack .sep { color: var(--text-dim); margin: 0 0.45em; }
  .tile__arrow {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text-mute);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    white-space: nowrap;
    transition: color 200ms ease;
  }
  .tile__arrow span { transition: transform 200ms ease; }
  .tile:hover .tile__arrow { color: var(--accent); }
  .tile:hover .tile__arrow span { transform: translateX(4px); }

  .tile__wip {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--warn);
    background: var(--warn-soft);
    border: 1px solid rgba(251, 191, 36, 0.3);
    padding: 0.2rem 0.5rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-radius: 4px;
    display: inline-block;
    line-height: 1;
    font-weight: 500;
  }

  /* ===== FOOTER ===== */
  footer {
    padding: 1.75rem 0 2.5rem;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.75rem;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }
  footer a {
    color: var(--text-mute);
    transition: color 200ms ease;
  }
  footer a:hover { color: var(--accent); }

  /* ===== ENTRY ANIMATION ===== */
  @media (prefers-reduced-motion: no-preference) {
    .hero h1, .tile {
      animation: rise 700ms cubic-bezier(.2, .6, .2, 1) both;
    }
    .hero h1 { animation-delay: 60ms; }
    .tile:nth-child(1) { animation-delay: 120ms; }
    .tile:nth-child(2) { animation-delay: 170ms; }
    .tile:nth-child(3) { animation-delay: 220ms; }
    .tile:nth-child(4) { animation-delay: 270ms; }
    .tile:nth-child(5) { animation-delay: 320ms; }
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .skip { position: absolute; left: -9999px; top: 1rem; }
  .skip:focus {
    left: 1rem;
    z-index: 100;
    background: var(--panel);
    color: var(--text);
    padding: 0.5rem 1rem;
    border: 1px solid var(--accent);
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 0.75rem;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 720px) {
    .bento { grid-template-columns: 1fr; gap: 0.7rem; }
    .tile { min-height: 200px; padding: 1.4rem; }
    .tile--feature { min-height: 280px; padding: 1.6rem; }
    .tile__foot { flex-direction: column; align-items: flex-start; gap: 0.85rem; }
  }
  @media (max-width: 480px) {
    .gh-link .gh-name-text,
    .gh-link .gh-sep,
    .gh-link .gh-count { display: none; }
    .gh-link { padding: 0.3rem; }
  }
</style>
</head>
<body>

<a href="#main" class="skip">Saltar para conteúdo</a>

<div class="container">

  <nav class="bar" aria-label="Cabeçalho">
    <a href="/" class="brand">M4RQX</a>
    <a class="gh-link loading" id="gh-link" href="https://github.com/M4RQX" target="_blank" rel="noopener noreferrer" aria-label="Perfil GitHub de M4RQX">
      <img class="avatar" id="gh-avatar" src="https://github.com/M4RQX.png?size=44" width="22" height="22" alt="" />
      <span class="gh-name-text">M4RQX</span>
      <span class="gh-sep">·</span>
      <span class="gh-count" id="gh-count">— seguidores</span>
    </a>
  </nav>

  <main id="main">
    <section class="hero">
      <h1>Cinco projetos.<br/><span class="acc">Cinco links</span> <span class="arrow">↗</span></h1>
    </section>

    <section class="bento" id="bento" aria-label="Projetos"></section>
  </main>

  <footer>
    <span>M4RQX · MMXXVI</span>
    <a href="https://github.com/M4RQX" target="_blank" rel="noopener noreferrer">github.com/M4RQX ↗</a>
  </footer>

</div>

<script>
  // ============================================================
  // Edita aqui para adicionar / remover / alterar projetos.
  //   featured: true  → tile maior, em destaque (1 só)
  //   wip: true       → mostra pill "Em curso"
  // ============================================================
  const projects = [
    {
      featured: true,
      name: "Summer Locked",
      description: "App pessoal de treino, nutrição e progresso. Mobile-first, dark, privada — pensada para dois utilizadores e três meses de disciplina.",
      stack: ["React", "TypeScript", "Tailwind", "Neon Postgres"],
      url: "https://github.com/M4RQX/locked-summer"
    },
    {
      name: "Serralharia",
      description: "App SaaS multi-tenant de gestão para serralharias — orçamentos, obras, clientes e financeiro.",
      stack: ["Next.js", "TypeScript", "Neon"],
      url: "https://github.com/M4RQX/serralharia"
    },
    {
      name: "King's Club",
      description: "Site institucional de barbearia, com duas versões de design para escolha do cliente.",
      stack: ["HTML", "CSS"],
      url: "https://github.com/M4RQX/kings-club"
    },
    {
      name: "VJ Fonseca",
      description: "Site institucional de serralharia em Cabanas de Torres, Alenquer.",
      stack: ["HTML", "CSS"],
      url: "https://github.com/M4RQX/vj-fonseca"
    },
    {
      name: "Tvde",
      description: "Projeto novo, ainda por arrancar.",
      stack: [],
      wip: true,
      url: "https://github.com/SomaeSeg/Tvde"
    }
  ];

  const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));

  // --- Render bento ---
  document.getElementById('bento').innerHTML = projects.map((p) => `
    <a class="tile ${p.featured ? 'tile--feature' : ''}" href="${esc(p.url)}" target="_blank" rel="noopener noreferrer" aria-label="Abrir ${esc(p.name)} no GitHub">
      <div class="tile__head">
        ${p.featured ? '<span class="tile__tag">Em destaque</span>' : '<span></span>'}
        <span class="tile__meta loading" data-url="${esc(p.url)}">…</span>
      </div>
      <div class="tile__body">
        <h2 class="tile__name">${esc(p.name)}${p.wip ? '<span class="tile__wip">Em curso</span>' : ''}</h2>
        <p class="tile__desc">${esc(p.description)}</p>
      </div>
      <div class="tile__foot">
        <span class="tile__stack">${
          p.stack && p.stack.length
            ? p.stack.map(esc).join('<span class="sep">·</span>')
            : '<span style="color:var(--text-dim)">—</span>'
        }</span>
        <span class="tile__arrow">Abrir <span aria-hidden="true">→</span></span>
      </div>
    </a>
  `).join('');

  // --- GitHub API (cached) ---
  const CACHE_TTL = 10 * 60 * 1000;
  async function ghFetch(url) {
    const key = 'gh:' + url;
    try {
      const c = sessionStorage.getItem(key);
      if (c) {
        const { ts, data } = JSON.parse(c);
        if (Date.now() - ts < CACHE_TTL) return data;
      }
    } catch {}
    try {
      const r = await fetch(url, { headers: { 'Accept': 'application/vnd.github+json' } });
      if (!r.ok) return null;
      const data = await r.json();
      try { sessionStorage.setItem(key, JSON.stringify({ ts: Date.now(), data })); } catch {}
      return data;
    } catch { return null; }
  }
  function parseRepo(url) {
    const m = String(url).match(/github\.com\/([^/]+)\/([^/?#]+?)(?:\.git)?(?:\/|$)/);
    return m ? { owner: m[1], repo: m[2] } : null;
  }
  function timeAgo(iso) {
    if (!iso) return '';
    const d = (Date.now() - new Date(iso).getTime()) / 1000;
    if (d < 60) return 'agora';
    const m = Math.floor(d / 60);
    if (m < 60) return `há ${m} min`;
    const h = Math.floor(m / 60);
    if (h < 24) return `há ${h} h`;
    const days = Math.floor(h / 24);
    if (days === 1) return 'há 1 dia';
    if (days < 7) return `há ${days} dias`;
    if (days < 30) return `há ${Math.floor(days / 7)} sem.`;
    const months = Math.floor(days / 30);
    if (months === 1) return 'há 1 mês';
    if (months < 12) return `há ${months} meses`;
    const years = Math.floor(days / 365);
    return years === 1 ? 'há 1 ano' : `há ${years} anos`;
  }
  function formatStars(n) {
    if (n == null) return '';
    if (n < 1000) return n.toString();
    return (n / 1000).toFixed(1) + 'k';
  }
  function renderMeta(el, data) {
    if (!data) { el.classList.add('empty'); el.classList.remove('loading'); return; }
    const parts = [];
    if (data.language) parts.push(`<span><span class="lang-dot"></span>${esc(data.language)}</span>`);
    if (data.stargazers_count > 0) parts.push(`<span>★ ${esc(formatStars(data.stargazers_count))}</span>`);
    if (data.pushed_at) parts.push(`<span>${esc(timeAgo(data.pushed_at))}</span>`);
    if (!parts.length) { el.classList.add('empty'); el.classList.remove('loading'); return; }
    el.innerHTML = parts.join('<span class="sep">·</span>');
    el.classList.remove('loading');
  }
  async function loadAll() {
    const link = document.getElementById('gh-link');
    const count = document.getElementById('gh-count');
    const prof = await ghFetch('https://api.github.com/users/M4RQX');
    if (prof) {
      const n = prof.followers ?? 0;
      count.textContent = `${n} seguidor${n === 1 ? '' : 'es'}`;
    } else {
      count.textContent = 'GitHub';
    }
    link.classList.remove('loading');

    const targets = document.querySelectorAll('[data-url]');
    await Promise.all(Array.from(targets).map(async (el) => {
      const info = parseRepo(el.dataset.url);
      if (!info) { el.classList.add('empty'); return; }
      const data = await ghFetch(`https://api.github.com/repos/${info.owner}/${info.repo}`);
      renderMeta(el, data);
    }));
  }
  loadAll();
</script>

</body>
</html>
