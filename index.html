<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portefólio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0b0e;
    --bg-elev: #14171d;
    --bg-elev-hover: #181c23;
    --border: rgba(255, 255, 255, 0.08);
    --border-hover: rgba(139, 92, 246, 0.45);
    --text: #e7e9ed;
    --text-muted: #8a8f99;
    --text-dim: #62666e;
    --accent: #8b5cf6;
    --accent-soft: rgba(139, 92, 246, 0.12);
    --accent-text: #c4b5fd;
    --warn-soft: rgba(234, 179, 8, 0.12);
    --warn-text: #fde047;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  body {
    background:
      radial-gradient(800px 400px at 20% -10%, rgba(139, 92, 246, 0.10), transparent 60%),
      radial-gradient(700px 500px at 100% 0%, rgba(56, 189, 248, 0.05), transparent 60%),
      var(--bg);
    background-attachment: fixed;
  }

  .container {
    max-width: 1180px;
    margin: 0 auto;
    padding: 6rem 2rem 4rem;
  }

  header { margin-bottom: 4rem; }

  h1 {
    font-size: clamp(2.25rem, 5vw, 3.5rem);
    font-weight: 700;
    letter-spacing: -0.025em;
    background: linear-gradient(180deg, #ffffff 0%, #b5b8bf 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.75rem;
  }

  .subtitle {
    font-size: 1.0625rem;
    color: var(--text-muted);
    max-width: 38rem;
    line-height: 1.55;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.25rem;
  }

  .card {
    display: flex;
    flex-direction: column;
    padding: 1.5rem;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: inherit;
    text-decoration: none;
    transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(139, 92, 246, 0.05), transparent 55%);
    opacity: 0;
    transition: opacity 180ms ease;
    pointer-events: none;
  }

  .card:hover {
    transform: translateY(-3px);
    border-color: var(--border-hover);
    background: var(--bg-elev-hover);
    box-shadow: 0 12px 32px -12px rgba(139, 92, 246, 0.25);
  }

  .card:hover::before { opacity: 1; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 0.75rem;
    margin-bottom: 0.5rem;
  }

  .card h3 {
    font-size: 1.125rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .arrow {
    color: var(--text-dim);
    font-size: 1rem;
    transition: transform 180ms ease, color 180ms ease;
    flex-shrink: 0;
  }

  .card:hover .arrow {
    color: var(--accent);
    transform: translate(2px, -2px);
  }

  .description {
    color: var(--text-muted);
    font-size: 0.9375rem;
    line-height: 1.55;
    margin-bottom: 1.25rem;
    flex-grow: 1;
  }

  .badges {
    display: flex;
    flex-wrap: wrap;
    gap: 0.375rem;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 0.25rem 0.625rem;
    background: var(--accent-soft);
    color: var(--accent-text);
    font-size: 0.75rem;
    font-weight: 500;
    border-radius: 999px;
    letter-spacing: 0.01em;
  }

  .badge.wip {
    background: var(--warn-soft);
    color: var(--warn-text);
  }

  footer {
    margin-top: 5rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 0.875rem;
    text-align: center;
  }

  @media (max-width: 640px) {
    .container { padding: 3rem 1.25rem 2.5rem; }
    header { margin-bottom: 2.5rem; }
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Portefólio</h1>
      <p class="subtitle">Coleção de projetos — sites institucionais, apps web e plataformas de gestão.</p>
    </header>

    <main class="grid" id="grid"></main>

    <footer>Clica num projeto para abrir o repositório no GitHub.</footer>
  </div>

  <script>
    // ============================================================
    // Edita aqui para adicionar / remover / alterar projetos.
    //   url: link que abre ao clicar no card
    //   wip: true → mostra badge "Em desenvolvimento"
    // ============================================================
    const projects = [
      {
        name: "Serralharia",
        description: "App SaaS multi-tenant de gestão para serralharias — orçamentos, obras, clientes e financeiro.",
        stack: ["Next.js", "TypeScript", "Neon"],
        url: "https://github.com/M4RQX/serralharia"
      },
      {
        name: "Summer Locked",
        description: "App pessoal de treino, nutrição e progresso. Mobile-first, dark, privada.",
        stack: ["React", "TypeScript", "Neon"],
        url: "https://github.com/M4RQX/locked-summer"
      },
      {
        name: "King's Club",
        description: "Site institucional de barbearia, com duas versões de design para escolha do cliente.",
        stack: ["HTML", "CSS"],
        url: "https://github.com/M4RQX/kings-club"
      },
      {
        name: "VJ Fonseca",
        description: "Site institucional de serralharia em Cabanas de Torres, Alenquer.",
        stack: ["HTML", "CSS"],
        url: "https://github.com/M4RQX/vj-fonseca"
      },
      {
        name: "Tvde",
        description: "Projeto novo, ainda por arrancar.",
        stack: [],
        wip: true,
        url: "https://github.com/SomaeSeg/Tvde"
      }
    ];

    const escapeHtml = (s) => s.replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));

    document.getElementById('grid').innerHTML = projects.map((p) => `
      <a class="card" href="${escapeHtml(p.url)}" target="_blank" rel="noopener noreferrer">
        <div class="card-header">
          <h3>${escapeHtml(p.name)}</h3>
          <span class="arrow" aria-hidden="true">↗</span>
        </div>
        <p class="description">${escapeHtml(p.description)}</p>
        <div class="badges">
          ${p.wip ? '<span class="badge wip">Em desenvolvimento</span>' : ''}
          ${p.stack.map((s) => `<span class="badge">${escapeHtml(s)}</span>`).join('')}
        </div>
      </a>
    `).join('');
  </script>
</body>
</html>
